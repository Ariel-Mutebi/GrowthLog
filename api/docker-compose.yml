services:
  build:
    container_name: GrowthLogBuild
    image: node:25-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: npx tsc --build --watch --preserveWatchOutput
    tty: true

  api:
    container_name: GrowthLogApi
    image: node:25-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c 'until [ -f dist/server.js ]; do sleep 0.1; done && node --watch dist/server.js'
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - build
      - postgres
      - redis
    tty: true

  postgres:
    container_name: GrowthLogPostgres
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql
    logging:
      driver: none

  redis:
    container_name: GrowthLogRedis
    image: redis:8
    ports:
      - "6379:6379"
    logging:
      driver: none
