services:
  build:
    container_name: GrowthLogBuild
    image: node:25-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: npx tsc --build --watch --preserveWatchOutput
    tty: true
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist/server.js"]
      interval: 1s
      retries: 30

  api:
    container_name: GrowthLogApi
    image: node:25-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: node --watch dist/server.js
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      build:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    tty: true

  caddy:
    container_name: GrowthLogCaddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./.local/certs:/etc/caddy/certs
      - ${CADDYFILE:-./Caddyfile.local}:/etc/caddy/Caddyfile
      - ./.local/caddy-data:/data
      - ./.local/caddy-config:/config
    depends_on:
      - api

  postgres:
    container_name: GrowthLogPostgres
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql
    logging:
      driver: none

  redis:
    container_name: GrowthLogRedis
    image: redis:8
    ports:
      - "6379:6379"
    logging:
      driver: none
