services:
  api:
    container_name: GrowthLogApi
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    tty: true

  caddy:
    container_name: GrowthLogCaddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

  postgres:
    container_name: GrowthLogPostgres
    image: postgres:18
    env_file:
      - .env
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql
    logging:
      driver: none

  redis:
    container_name: GrowthLogRedis
    image: redis:8
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    logging:
      driver: none

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
