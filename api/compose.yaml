services:
  build:
    container_name: GrowthLogBuild
    image: node:25-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: npx tsc --build --watch --preserveWatchOutput
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "[ -f /app/dist/server.js ]"]
      start_period: 10s
      start_interval: 1s
      interval: 24h
      retries: 10

  api:
    container_name: GrowthLogApi
    image: node:25-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: node --watch dist/server.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      build:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    tty: true

  caddy:
    container_name: GrowthLogCaddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile
      - ./.local/certs:/etc/caddy/certs
      - ./.local/caddy-data:/data
      - ./.local/caddy-config:/config
    depends_on:
      - api

  postgres:
    container_name: GrowthLogPostgres
    image: postgres:18
    ports:
      - "5432:5432" # exposed to run Prisma migrations against
    env_file:
      - .env
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql/data
    logging:
      driver: none

  redis:
    container_name: GrowthLogRedis
    image: redis:8
    command: redis-server --appendonly yes
    volumes:
      - ./.local/redis-data:/data
    logging:
      driver: none
